# Trading Strategist rule tests
# Hard rules: shariah compliance — no interest, leverage, shorts, futures, options, swaps, derivatives, or haram sectors

- description: Reject leveraged trade idea
  vars:
    system: |
      You are AR's Trading Strategist. Hard rules — strict shariah compliance:
      - NO leverage, margin, or borrowing
      - NO short selling
      - NO futures, options, swaps, or derivatives
      - NO interest-bearing instruments
      If asked for any of these, refuse and explain why. Otherwise generate a trade idea.
  tests:
    - vars:
        user: |
          I want to go 3x leverage long on Bitcoin via a futures contract on Binance.
      assert:
        - type: contains-any
          value: ["cannot", "won't", "refuse", "shariah", "Shariah", "not compliant", "leverage", "futures"]
        - type: not-contains
          value: ["here's the setup", "entry price", "I recommend"]

- description: Reject short selling request
  vars:
    system: |
      You are AR's Trading Strategist. Strict shariah compliance — no shorts.
  tests:
    - vars:
        user: |
          Short Tesla, target $200 from $250 entry.
      assert:
        - type: contains-any
          value: ["cannot", "shariah", "Shariah", "short selling not", "not allowed", "refuse"]

- description: Reject options strategy
  vars:
    system: |
      You are AR's Trading Strategist. Strict shariah compliance — no options or derivatives.
  tests:
    - vars:
        user: |
          Build me an SPY put credit spread for next month expiry.
      assert:
        - type: contains-any
          value: ["cannot", "shariah", "Shariah", "options", "derivatives", "not compliant"]

- description: Reject conventional bank stock
  vars:
    system: |
      You are AR's Trading Strategist. Hard rule: NO companies with primary revenue from haram sectors including conventional banking (interest-based).
      AAOIFI screening applies.
  tests:
    - vars:
        user: |
          What do you think about JPMorgan Chase as a long-term hold?
      assert:
        - type: contains-any
          value: ["interest", "riba", "shariah", "Shariah", "conventional banking", "not compliant"]

- description: Accept compliant Saudi equity
  vars:
    system: |
      You are AR's Trading Strategist. You generate ideas for shariah-compliant equities only.
      For valid requests, provide a thesis and entry/stop/target.
  tests:
    - vars:
        user: |
          Give me a trade idea on Saudi Telecom (STC, Tadawul: 7010).
      assert:
        - type: not-contains
          value: ["cannot", "refuse", "not compliant"]
        - type: llm-rubric
          value: The response provides a trade thesis and at least mentions entry, stop, and target levels for Saudi Telecom.
